services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: livekit-trainer-dev:local
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - livekit-trainer-python-cache:/root/.cache
    environment:
      PYTHONUNBUFFERED: "1"
    tty: true
    stdin_open: true

  sync-server:
    build:
      context: ./runtime/sync-server
      dockerfile: Dockerfile
    image: livekit-trainer-sync-server:local
    # Run as the host user so files written into the mounted ./data and
    # ./incoming volumes are owned by that user instead of root.
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    # Join the host docker group so the mounted socket is usable while still
    # running as the unprivileged host user. Override DOCKER_GID if the host's
    # docker group id differs.
    group_add:
      - "${DOCKER_GID:-970}"
    ports:
      - "8765:8765"
    volumes:
      - ./data:/data
      - ./incoming:/incoming
      # Read/serve trained models and per-run training status/logs. Read-only:
      # the trainer container writes here through its own /work bind mount.
      - ./output:/output:ro
      # Trainer scripts, read-only. The synthetic-positive generator needs to
      # `docker cp` f5_gen_positives.py into the F5 container; docker cp resolves
      # its local source inside THIS container, so the script must be mounted
      # here (a host path is not visible from in here).
      - ./trainer:/trainer:ro
      # Host docker socket: the training endpoints launch the trainer image as a
      # sibling container. Requires group_add above for access.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      BIND_ADDR: "0.0.0.0:8765"
      DATA_ROOT: "/data/real"
      INCOMING_ROOT: "/incoming/bundles"
      MODELS_DIR: "/output"
      # Absolute path of this repo on the *host*. The trainer container mounts it
      # at /work, so this must be a host path, not a container path.
      HOST_REPO_ROOT: "${HOST_REPO_ROOT:-/data/livekit_trainer}"
      # Trainer image tag launched for a full training run, and whether to pass
      # --gpus all. Build the image once with trainer/scripts/train.sh or a plain
      # docker build of trainer/Dockerfile.trainer.
      TRAINER_IMAGE: "${TRAINER_IMAGE:-livekit-wakeword-trainer:latest}"
      TRAINER_USE_GPU: "${TRAINER_USE_GPU:-1}"
      # Where recorded audio is transcribed. This is the source of truth for the
      # Whisper server; the Android app no longer configures it.
      WHISPER_SERVER_URL: "${WHISPER_SERVER_URL:-http://pickle.bam.net:8572}"
      # Where the model-test scoring endpoint sends audio. Points at the scorer
      # service below; unset disables /score only.
      SCORER_SERVER_URL: "${SCORER_SERVER_URL:-http://scorer:8770}"
    depends_on:
      - scorer

  # Rolling-window wake-word scorer. Loads trained models from ./output and
  # turns an uploaded 16 kHz mono WAV into a detection-score curve. Bases on the
  # trainer image so featurization matches training exactly.
  scorer:
    build:
      context: ./runtime/scorer
      dockerfile: Dockerfile
    image: livekit-wakeword-scorer:local
    # Host publish is optional; the sync-server reaches the scorer over the
    # compose network at scorer:8770. The host port is arbitrary (this service
    # is not internet-exposed) and can be overridden with SCORER_HOST_PORT.
    ports:
      - "${SCORER_HOST_PORT:-8780}:8770"
    volumes:
      - ./output:/output:ro
    environment:
      MODELS_DIR: "/output"
      PORT: "8770"

volumes:
  livekit-trainer-python-cache:
